name: compiler-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lexer unit test
        run: python3 compiler/lexer_test.py

      - name: Unsupported features must be rejected
        run: bash scripts/test_compiler_unsupported_rejected.sh

      - name: Class inheritance asm-shape
        run: bash scripts/test_compiler_class_inheritance.sh

      - name: Smoke compile (asm target)
        run: |
          cat > /tmp/smoke.ad <<'EOF'
          def add(a: int32, b: int32) -> int32:
              return a + b

          def main() -> int32:
              return add(40, 2)
          EOF
          python3 -m compiler.adder asm --target=x86_64-adder-user /tmp/smoke.ad -o /tmp/smoke.s
          test -s /tmp/smoke.s
          grep -q 'add:' /tmp/smoke.s
          grep -q 'main:' /tmp/smoke.s
